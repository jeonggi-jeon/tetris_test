<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네온 테트리스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app" id="app">
    <div class="bg-aurora" aria-hidden="true"></div>

    <header class="header">
      <h1 class="title">네온 테트리스</h1>
      <p class="subtitle desktop-only-hint">방향키 이동 · ↑ 회전 · 스페이스 하드드롭 · P 일시정지</p>
      <p class="subtitle mobile-only-hint">우측 버튼으로 조작 · 같은 Wi‑Fi에서 PC 주소로 접속</p>
    </header>

    <main class="main">
      <div class="game-and-hud">
        <div class="board-wrap" id="boardWrap">
          <canvas id="gameCanvas" width="320" height="640" aria-label="게임 보드"></canvas>
          <div class="flash-overlay" id="flashOverlay" aria-hidden="true"></div>

          <!-- 모바일 오버레이: 게임 위의 정보 -->
          <div class="game-overlay">
            <!-- 좌상단: 점수 -->
            <div class="info-card info-score">
              <div class="card-title">점수</div>
              <div class="stat value" id="scoreMobile">0</div>
            </div>

            <!-- 우상단: 레벨 + 라인 -->
            <div class="info-card info-level">
              <div class="card-title">레벨</div>
              <div class="stat value" id="levelMobile">1</div>
            </div>
            <div class="info-card info-lines">
              <div class="card-title">라인</div>
              <div class="stat value" id="linesMobile">0</div>
            </div>

            <!-- 우하단: 다음 조각 -->
            <div class="info-card info-next">
              <div class="card-title">다음</div>
              <canvas id="nextCanvasMobile" width="100" height="100" aria-label="다음 조각"></canvas>
            </div>
          </div>

          <!-- 모바일 터치 컨트롤 (게임 위) -->
          <div class="mobile-controls" aria-label="터치 조작 패널">
            <button type="button" class="touch-btn btn-pause" data-action="pause" aria-label="일시정지">Ⅱ</button>
            <button type="button" class="touch-btn btn-rotate" data-action="rotate" aria-label="회전">↻</button>
            <button type="button" class="touch-btn btn-left" data-action="left" aria-label="왼쪽">←</button>
            <button type="button" class="touch-btn btn-soft-drop" data-action="soft-drop" aria-label="소프트 드롭">↓</button>
            <button type="button" class="touch-btn btn-right" data-action="right" aria-label="오른쪽">→</button>
            <button type="button" class="touch-btn btn-hard-drop" data-action="hard-drop" aria-label="하드 드롭">⤓</button>
          </div>

          <!-- 시작 버튼 (게임 위) -->
          <button type="button" class="btn-primary btn-start-overlay" id="btnStart">게임 시작</button>
        </div>

        <!-- PC 사이드 패널 -->
        <aside class="panel">
          <section class="glass card">
            <h2 class="card-title">점수</h2>
            <p class="stat value" id="score">0</p>
          </section>
          <section class="glass card">
            <h2 class="card-title">레벨</h2>
            <p class="stat value" id="level">1</p>
          </section>
          <section class="glass card">
            <h2 class="card-title">라인</h2>
            <p class="stat value" id="lines">0</p>
          </section>
          <section class="glass card next-card">
            <h2 class="card-title">다음</h2>
            <canvas id="nextCanvas" width="120" height="120" aria-label="다음 조각"></canvas>
          </section>

          <div class="controls-hint glass card desktop-only-hint">
            <p>← → 이동</p>
            <p>↓ 소프트 드롭</p>
            <p>↑ 회전</p>
            <p>Space 하드 드롭</p>
          </div>

          <button type="button" class="btn-primary" id="btnStart">게임 시작</button>
        </aside>
      </div>
    </main>

    <div class="overlay" id="pauseOverlay" hidden>
      <div class="overlay-box glass">
        <h2>일시정지</h2>
        <p class="pause-hint-desktop">P 또는 Esc로 계속</p>
        <p class="pause-hint-mobile">우측 일시정지 버튼으로 계속</p>
      </div>
    </div>

    <div class="overlay" id="gameOverOverlay" hidden>
      <div class="overlay-box glass">
        <h2>게임 오버</h2>
        <p class="final-score">최종 점수: <span id="finalScore">0</span></p>
        <button type="button" class="btn-primary" id="btnRestart">다시 하기</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
